<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Prince of Persia 2: The Shadow and the Flame</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(ellipse at center, #2a1d12 0%, #140d08 70%, #0a0705 100%);
    color: #d8c7a0;
    font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px; padding: 16px; text-align: center;
  }
  h1 {
    margin: 0; font-size: 14px; font-weight: 600; letter-spacing: .18em;
    text-transform: uppercase; color: #b89a63; opacity: .85;
  }
  #picker {
    border: 2px dashed #5a4327; border-radius: 12px; padding: 36px 40px; max-width: 560px;
    background: rgba(0,0,0,.25); transition: border-color .15s, background .15s;
  }
  #picker.drag { border-color: #b89a63; background: rgba(184,154,99,.10); }
  #picker p { margin: 8px 0; color: #c8b896; }
  #picker .small { font-size: 12px; color: #8a7a5a; }
  label.btn {
    display: inline-block; margin: 8px 0; padding: 9px 18px; cursor: pointer;
    background: #5a3a1c; color: #f0e2c0; border-radius: 8px; border: 1px solid #7a5328;
    font-size: 14px;
  }
  label.btn:hover { background: #6e4824; }
  #file { display: none; }
  #canvas {
    display: none; background: #000;
    image-rendering: pixelated; image-rendering: crisp-edges;
    height: min(78vh, 71vw); width: auto; aspect-ratio: 512 / 384;
    border: 1px solid #3a2a18; box-shadow: 0 10px 50px rgba(0,0,0,.7);
    outline: none;
  }
  #status { font-size: 13px; color: #8a7a5a; min-height: 1.2em; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <h1>Prince of Persia 2 &middot; The Shadow and the Flame</h1>

  <div id="picker">
    <p>Load your game data to play.</p>
    <label class="btn" for="file">Choose data archive…</label>
    <input type="file" id="file" accept=".gz,.tgz,.tar">
    <p class="small">or drag &amp; drop <code>pop2-data.tar.gz</code> here</p>
    <p class="small">(your own extracted Prince of Persia 2 data — nothing is uploaded; it stays in your browser)</p>
  </div>

  <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
  <div id="status">initializing…</div>

  <script>
    var statusEl = document.getElementById('status');
    var pickerEl = document.getElementById('picker');
    var ready = false;

    window.Module = window.Module || {};
    Module.canvas = document.getElementById('canvas');
    Module.print = function (t) { console.log(t); };
    Module.printErr = function (t) { console.error(t); };
    Module.setStatus = function (t) { if (statusEl) statusEl.textContent = t || ''; };
    Module.onRuntimeInitialized = function () { ready = true; Module.setStatus(''); };

    async function gunzip(bytes) {
      var ds = new DecompressionStream('gzip');
      var stream = new Blob([bytes]).stream().pipeThrough(ds);
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }

    // Minimal POSIX/ustar tar reader: regular files only (type '0'/'\0').
    function untar(bytes) {
      var td = new TextDecoder();
      var files = [], off = 0;
      var str = function (a, b) { return td.decode(bytes.subarray(a, b)).replace(/\0[\s\S]*$/, '').trim(); };
      while (off + 512 <= bytes.length) {
        var name = str(off, off + 100);
        if (!name) break;                                  // zero block = end
        var size = parseInt(str(off + 124, off + 136) || '0', 8) || 0;
        var type = String.fromCharCode(bytes[off + 156]);
        var prefix = str(off + 345, off + 500);
        var full = (prefix ? prefix + '/' + name : name).replace(/^\.\//, '');
        off += 512;
        if (type === '0' || type === '\0' || type === '')
          files.push({ name: full, data: bytes.subarray(off, off + size) });
        off += Math.ceil(size / 512) * 512;
      }
      return files;
    }

    function mkdirp(path) {
      var parts = path.split('/').filter(Boolean), cur = '';
      for (var i = 0; i < parts.length; i++) { cur += '/' + parts[i]; try { Module.FS.mkdir(cur); } catch (e) {} }
    }

    async function loadData(file) {
      if (!ready) { Module.setStatus('still initializing — try again in a moment'); return; }
      try {
        Module.setStatus('reading ' + file.name + '…');
        var bytes = new Uint8Array(await file.arrayBuffer());
        if (/\.t?gz$/i.test(file.name)) { Module.setStatus('decompressing…'); bytes = await gunzip(bytes); }
        Module.setStatus('unpacking…');
        var files = untar(bytes);
        if (!files.length) { Module.setStatus('not a tar archive — expected pop2-data.tar.gz'); return; }
        for (var i = 0; i < files.length; i++) {
          var dst = '/data/' + files[i].name;
          mkdirp(dst.slice(0, dst.lastIndexOf('/')));
          Module.FS.writeFile(dst, files[i].data);
        }
        if (!Module.FS.analyzePath('/data/app/CODE').exists) {
          Module.setStatus("archive has no app/CODE — wrong data? expected app/, data/, pop2/");
          return;
        }
        pickerEl.style.display = 'none';
        Module.canvas.style.display = 'block';
        Module.setStatus('starting…');
        Module.callMain(['/data/app/CODE', '/data/pop2']);
        Module.setStatus('');
      } catch (e) {
        Module.setStatus('failed: ' + e);
        console.error(e);
      }
    }

    document.getElementById('file').addEventListener('change', function (e) {
      if (e.target.files[0]) loadData(e.target.files[0]);
    });
    ['dragenter', 'dragover'].forEach(function (ev) {
      pickerEl.addEventListener(ev, function (e) { e.preventDefault(); pickerEl.classList.add('drag'); });
    });
    ['dragleave', 'drop'].forEach(function (ev) {
      pickerEl.addEventListener(ev, function (e) { e.preventDefault(); pickerEl.classList.remove('drag'); });
    });
    pickerEl.addEventListener('drop', function (e) {
      if (e.dataTransfer.files[0]) loadData(e.dataTransfer.files[0]);
    });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
